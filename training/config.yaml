model:
  base_model_id: "Qwen/Qwen3-VL-4B-Instruct"
  target_model_id: "Qwen/Qwen3-0.6B"
  k_steps: 4
  
training:
  epochs: 5
  batch_size: 32
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  loss_type: "vicreg"  # supports: info_nce_vanilla, info_nce_threshold, vicreg
  max_grad_norm: 50.0
  vicreg_sim_coeff: 25.0
  vicreg_var_coeff: 25.0
  vicreg_cov_coeff: 0.04
  checkpoint_dir: "/workspace/checkpoints"

data:
  jsonl_path: "data/geothoughts_verified.jsonl"
  targets_dir: "data/target_tensors_verified/"
