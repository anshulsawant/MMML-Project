model:
  base_model_id: "Qwen/Qwen3-VL-4B-Instruct"
  target_model_id: "Qwen/Qwen3-VL-4B-Instruct"
  decoder_base_model_id: "Qwen/Qwen3-4B-Base"
  k_steps: 4

experiment:
  name: "v2_huber_mean_pooled"

build_manifold:
  batch_size: 4
  
train_x_encoder:
  experiment_name: "v2_huber_mean_pooled"
  epochs: 100
  batch_size: 16
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  loss_type: "huber_cosine"  # supports: info_nce_vanilla, info_nce_threshold, vicreg, huber_cosine
  max_grad_norm: 50.0
  vicreg_sim_coeff: 1.0
  vicreg_var_coeff: 1.0
  vicreg_cov_coeff: 0.0

train_decoder:
  epochs: 20
  batch_size: 32
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  max_grad_norm: 5.0

data:
  jsonl_path: "data/geothoughts_verified.jsonl"
