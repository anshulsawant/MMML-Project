model:
  base_model_id: "Qwen/Qwen3-VL-4B-Instruct"
  target_model_id: "Qwen/Qwen3-4B-Base"
  k_steps: 4
  x_encoder_weights: "/workspace/checkpoints/x_encoder_best.pt"
  
training:
  experiment_name: "v2_huber_mean_pooled"
  epochs: 20
  batch_size: 32
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  max_grad_norm: 5.0
  checkpoint_dir: "/workspace/checkpoints/decoder"

data:
  jsonl_path: "data/geothoughts_verified.jsonl"
