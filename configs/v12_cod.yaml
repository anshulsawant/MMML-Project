model:
  base_model_id: "Qwen/Qwen3-VL-4B-Instruct"
  target_model_id: "Qwen/Qwen3-VL-4B-Instruct"
  decoder_base_model_id: "Qwen/Qwen3-4B-Base"
  k_steps: 2

experiment:
  name: "v12_manifold_anchor_cod"

build_manifold:
  batch_size: 4

train_x_encoder:
  experiment_name: "v12_manifold_anchor_cod"
  epochs: 30
  batch_size: 64
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-4
  weight_decay: 0.01
  save_every_n_steps: 0
  max_val_samples: 128
  loss_type: "huber_cosine"
  loss_target: "guided"
  max_grad_norm: 50.0
  vicreg_sim_coeff: 1.0
  vicreg_var_coeff: 1.0
  vicreg_cov_coeff: 0.0
  use_robust_checkpoint_save: true
  keep_step_checkpoints: 4
  keep_epoch_checkpoints: 4
  save_epoch_checkpoints_after: 7

train_decoder:
  experiment_name: "v12_manifold_anchor_cod"
  unfreeze_layers: 2
  use_projection_mlp: True
  epochs: 20
  batch_size: 64
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  weight_decay: 0.01
  max_grad_norm: 5.0
  s3_bucket: "7ih6gcggwr"
  hf_repo: shilinm/latent_euclid

data:
  jsonl_path: "data/geothoughts_verified.jsonl"

train_manifold_anchor:
  experiment_name: "v12_manifold_anchor_cod"
  cod_dataset: "ChainOfDraft/qwen3_vl_cod_dataset_filtered_sc.jsonl"
  epochs: 10
  batch_size: 4
  learning_rate: 1.0e-4
  mse_weight: 0.1
  s3_bucket: "7ih6gcggwr"
  s3_prefix: null
  hf_repo: shilinm/latent_euclid